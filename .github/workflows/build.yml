name: Build Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate debug.keystore
        run: |
          cd src/ja/rawlazy
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: List project structure
        run: |
          ls -la
          ls -la src/ja/rawlazy/ || true
          ls -la src/ja/rawlazy/src/ || true

      - name: Build with Gradle (full debug)
        run: |
          gradle clean --full-stacktrace
          gradle :rawlazy:tasks
          gradle :rawlazy:assembleDebug --full-stacktrace --info
          gradle :rawlazy:assembleRelease --full-stacktrace --info

      - name: List all build outputs
        run: |
          echo "=== All build outputs ==="
          find . -name "*.apk" 2>/dev/null || true
          find . -type d -name "apk" 2>/dev/null || true
          echo "=== src/ja/rawlazy/build ==="
          ls -laR src/ja/rawlazy/build/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rawlazy-extension
          path: |
            **/*.apk
          retention-days: 30
