name: Build Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build with Gradle
        run: |
          gradle clean
          gradle :rawlazy:assembleDebug
          gradle :rawlazy:assembleRelease

      - name: List build outputs
        run: ls -la src/ja/rawlazy/build/outputs/apk/ || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rawlazy-extension
          path: |
            src/ja/rawlazy/build/outputs/apk/debug/*.apk
            src/ja/rawlazy/build/outputs/apk/release/*.apk
          retention-days: 30
