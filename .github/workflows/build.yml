name: Build Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download Gradle
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            curl -s -L "https://services.gradle.org/distributions/gradle-8.10-bin.zip" -o gradle/wrapper/gradle.zip
            unzip -q gradle/wrapper/gradle.zip -d gradle
            cp gradle/gradle-8.10/lib/gradle-wrapper.jar gradle/wrapper/
            rm -rf gradle/gradle-8.10 gradle/wrapper/gradle.zip
          fi

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rawlazy-extension
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
